apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorywiki-api
  labels: { app: memorywiki-api }
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: memorywiki-api }
  template:
    metadata:
      labels: { app: memorywiki-api }
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.api.port }} }]
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.api.port }}"
            - name: Jwt__SigningKey
              valueFrom: { secretKeyRef: { name: memorywiki-secrets, key: jwtSigningKey } }
{{ include "memorywiki.env" . | indent 12 }}
          readinessProbe:
            httpGet: { path: /api/health/ready, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: memorywiki-api
spec:
  selector: { app: memorywiki-api }
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memorywiki-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memorywiki-api
  minReplicas: {{ .Values.api.replicas }}
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
